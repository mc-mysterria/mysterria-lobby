# Teleport system messages
teleport:
  no_permission:
    en: "<red>⛔ You don't have permission to access this teleporter!</red>"
    ua: "<red>⛔ У вас немає дозволу для доступу до цього телепорта!</red>"
    es: "<red>⛔ ¡No tienes permiso para acceder a este teletransportador!</red>"
    
  detected:
    en: "<gradient:#4dd0e1:#26c6da>🌊 You've touched the portal waves! Slow falling activated. Teleporting to <white>%server%</white> in <yellow>%delay%</yellow> seconds...</gradient>"
    ua: "<gradient:#4dd0e1:#26c6da>🌊 Ви торкнулися хвиль порталу! Повільне падіння активовано. Телепортація до <white>%server%</white> через <yellow>%delay%</yellow> секунд...</gradient>"
    es: "<gradient:#4dd0e1:#26c6da>🌊 ¡Has tocado las olas del portal! Caída lenta activada. Teletransportando a <white>%server%</white> en <yellow>%delay%</yellow> segundos...</gradient>"
    
  title:
    en: "<gradient:#a8e6cf:#7fcdcd><bold>✨ Teleporting!</bold></gradient>"
    ua: "<gradient:#a8e6cf:#7fcdcd><bold>✨ Телепортація!</bold></gradient>"
    es: "<gradient:#a8e6cf:#7fcdcd><bold>✨ ¡Teletransportando!</bold></gradient>"
    
  subtitle:
    en: "<gray>Connecting to <yellow>%server%</yellow>...</gray>"
    ua: "<gray>Підключення до <yellow>%server%</yellow>...</gray>"
    es: "<gray>Conectando a <yellow>%server%</yellow>...</gray>"
    
  bounds_shown:
    en: "<gradient:#00d4ff:#0099cc>🔍 Showing boundaries for zone '<white>%zone%</white>' for 10 seconds!</gradient>"
    ua: "<gradient:#00d4ff:#0099cc>🔍 Показ меж для зони '<white>%zone%</white>' протягом 10 секунд!</gradient>"
    es: "<gradient:#00d4ff:#0099cc>🔍 ¡Mostrando límites de la zona '<white>%zone%</white>' por 10 segundos!</gradient>"
    
  sea_enabled:
    en: "<gradient:#4dd0e1:#26c6da>🌊 Sea effect <green>enabled</green> for zone '<white>%zone%</white>'!</gradient>"
    ua: "<gradient:#4dd0e1:#26c6da>🌊 Ефект моря <green>увімкнено</green> для зони '<white>%zone%</white>'!</gradient>"
    es: "<gradient:#4dd0e1:#26c6da>🌊 ¡Efecto de mar <green>habilitado</green> para la zona '<white>%zone%</white>'!</gradient>"
    
  sea_disabled:
    en: "<gradient:#4dd0e1:#26c6da>🌊 Sea effect <red>disabled</red> for zone '<white>%zone%</white>'.</gradient>"
    ua: "<gradient:#4dd0e1:#26c6da>🌊 Ефект моря <red>вимкнено</red> для зони '<white>%zone%</white>'.</gradient>"
    es: "<gradient:#4dd0e1:#26c6da>🌊 Efecto de mar <red>deshabilitado</red> para la zona '<white>%zone%</white>'.</gradient>"

# ─────────────────────────────────────────
# LOBBY FEATURES
# ─────────────────────────────────────────

# Boss bar shown to all players in the lobby
bossbar:
  enabled: false
  color: BLUE       # BLUE, GREEN, PINK, PURPLE, RED, WHITE, YELLOW
  style: PROGRESS   # PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
  progress: 1.0
  text:
    en: "<gradient:#667eea:#764ba2>✦ Welcome to Mysterria Network ✦</gradient>"
    ua: "<gradient:#667eea:#764ba2>✦ Ласкаво просимо до Mysterria Network ✦</gradient>"
    es: "<gradient:#667eea:#764ba2>✦ Bienvenido a Mysterria Network ✦</gradient>"

# Rotating action bar messages sent to all online players
# Supports placeholders: {online}, {max}, {player}
action_bar:
  enabled: false
  switch_interval: 100   # ticks between message switches (100 = 5 s)
  messages:
    1:
      en: "<gradient:#ffd700:#ffaa00>✦ {online} players online ✦</gradient>"
      ua: "<gradient:#ffd700:#ffaa00>✦ {online} гравців онлайн ✦</gradient>"
      es: "<gradient:#ffd700:#ffaa00>✦ {online} jugadores en línea ✦</gradient>"
    2:
      en: "<gray>Join our Discord: <gradient:#667eea:#764ba2>discord.gg/mysterria</gradient>"
      ua: "<gray>Discord: <gradient:#667eea:#764ba2>discord.gg/mysterria</gradient>"
      es: "<gray>Discord: <gradient:#667eea:#764ba2>discord.gg/mysterria</gradient>"

# Periodic broadcast messages sent to all players in chat
announcements:
  enabled: false
  interval: 180   # seconds between announcements
  messages:
    1:
      en: "<gradient:#667eea:#764ba2>💬 Join our Discord community! discord.gg/mysterria</gradient>"
      ua: "<gradient:#667eea:#764ba2>💬 Приєднуйтесь до Discord! discord.gg/mysterria</gradient>"
      es: "<gradient:#667eea:#764ba2>💬 ¡Únete a Discord! discord.gg/mysterria</gradient>"
    2:
      en: "<gradient:#ffd700:#ffaa00>🌟 Explore all game modes with the Server Selector!</gradient>"
      ua: "<gradient:#ffd700:#ffaa00>🌟 Досліджуйте режими через Вибір Серверів!</gradient>"
      es: "<gradient:#ffd700:#ffaa00>🌟 ¡Explora todos los modos con el Selector de Servidores!</gradient>"

# Double jump — players can jump again mid-air
double_jump:
  enabled: false
  strength: 1.0          # vertical launch power (1.0 = normal jump height)
  cooldown: 3.0          # seconds before the double jump recharges
  sound: ENTITY_FIREWORK_ROCKET_LAUNCH