# Complete MysterriaLobby Configuration Example
# This shows all available features and options

general:
  firework_on_join: true
  heal_on_join: true
  teleport_to_spawn: true

# Language system - automatically detects client locale
language:
  default: "en"
  # Explicit list of available languages. If empty, auto-detected from join.items keys.
  available:
    - en
    - ua
    - es
  # Allow players to manually override their language with /lobby setlang
  allow_manual_selection: true

# Player visibility toggle system
player_hider:
  enabled: true
  slot: 8
  toggle_item:
    shown:
      name:
        en: "<gradient:#4CAF50:#45a049><bold>👥 Players Visible</bold></gradient>"
        ua: "<gradient:#4CAF50:#45a049><bold>👥 Гравці видимі</bold></gradient>"
        es: "<gradient:#4CAF50:#45a049><bold>👥 Jugadores Visibles</bold></gradient>"
      lore:
        en:
          - "<gray>Click to hide all players"
          - ""
          - "<gradient:#81c784:#66bb6a>✅ Players are currently visible</gradient>"
        ua:
          - "<gray>Натисніть, щоб приховати всіх гравців"
          - ""
          - "<gradient:#81c784:#66bb6a>✅ Гравці зараз видимі</gradient>"
        es:
          - "<gray>Haz clic para ocultar jugadores"
          - ""
          - "<gradient:#81c784:#66bb6a>✅ Los jugadores están visibles</gradient>"
    hidden:
      name:
        en: "<gradient:#f44336:#d32f2f><bold>👻 Players Hidden</bold></gradient>"
        ua: "<gradient:#f44336:#d32f2f><bold>👻 Гравці приховані</bold></gradient>"
        es: "<gradient:#f44336:#d32f2f><bold>👻 Jugadores Ocultos</bold></gradient>"
      lore:
        en:
          - "<gray>Click to show all players"
          - ""
          - "<gradient:#ef5350:#e53935>❌ Players are currently hidden</gradient>"
        ua:
          - "<gray>Натисніть, щоб показати всіх гравців"
          - ""
          - "<gradient:#ef5350:#e53935>❌ Гравці зараз приховані</gradient>"
        es:
          - "<gray>Haz clic para mostrar jugadores"
          - ""
          - "<gradient:#ef5350:#e53935>❌ Los jugadores están ocultos</gradient>"

# Join screen: title and welcome message
join:
  title:
    enabled: true
    title:
      en: "<gradient:#667eea:#764ba2><bold>Welcome!</bold></gradient>"
      ua: "<gradient:#667eea:#764ba2><bold>Ласкаво просимо!</bold></gradient>"
      es: "<gradient:#667eea:#764ba2><bold>¡Bienvenido!</bold></gradient>"
    subtitle:
      en: "<gray>Enjoy your stay on Mysterria</gray>"
      ua: "<gray>Приємного перебування на Mysterria</gray>"
      es: "<gray>Disfruta tu estancia en Mysterria</gray>"
    fade_in: 10
    stay: 70
    fade_out: 20
  message:
    enabled: true
    en: "<gradient:#667eea:#764ba2>✦</gradient> <gray>Welcome back, <gradient:#ffd700:#ffaa00>{player}</gradient>!"
    ua: "<gradient:#667eea:#764ba2>✦</gradient> <gray>З поверненням, <gradient:#ffd700:#ffaa00>{player}</gradient>!"
    es: "<gradient:#667eea:#764ba2>✦</gradient> <gray>¡Bienvenido de vuelta, <gradient:#ffd700:#ffaa00>{player}</gradient>!"
  items:
    server_info:
      slot: 0
      material: ENCHANTED_BOOK
      amount: 1
      display_name:
        en: "<gradient:#667eea:#764ba2><bold>📖 Server Guide</bold></gradient>"
        ua: "<gradient:#667eea:#764ba2><bold>📖 Довідник сервера</bold></gradient>"
        es: "<gradient:#667eea:#764ba2><bold>📖 Guía del Servidor</bold></gradient>"
      lore:
        en:
          - "<gray>Everything you need to know"
          - "<gradient:#ffd700:#ffaa00>✨ Rules, commands, and more!</gradient>"
          - ""
          - "<yellow>➤ Right-click to open</yellow>"
        ua:
          - "<gray>Все, що вам потрібно знати"
          - "<gradient:#ffd700:#ffaa00>✨ Правила, команди та інше!</gradient>"
          - ""
          - "<yellow>➤ ПКМ щоб відкрити</yellow>"
        es:
          - "<gray>Todo lo que necesitas saber"
          - "<gradient:#ffd700:#ffaa00>✨ Reglas, comandos y más!</gradient>"
          - ""
          - "<yellow>➤ Clic derecho para abrir</yellow>"
      actions:
        - "[MENU] server_info"

    server_selector:
      slot: 4
      material: NETHER_STAR
      display_name:
        en: "<gradient:#ff6b6b:#ee5a52><bold>🌟 Server Selector</bold></gradient>"
        ua: "<gradient:#ff6b6b:#ee5a52><bold>🌟 Вибір серверів</bold></gradient>"
        es: "<gradient:#ff6b6b:#ee5a52><bold>🌟 Selector de Servidores</bold></gradient>"
      lore:
        en:
          - "<gray>Travel to different game modes"
          - "<gradient:#4ecdc4:#45b7aa>🚀 Survival, Creative, Minigames!</gradient>"
          - ""
          - "<yellow>➤ Right-click to choose</yellow>"
        ua:
          - "<gray>Подорожуйте різними ігровими режимами"
          - "<gradient:#4ecdc4:#45b7aa>🚀 Виживання, Творчість, Міні-ігри!</gradient>"
          - ""
          - "<yellow>➤ ПКМ щоб обрати</yellow>"
        es:
          - "<gray>Viaja a diferentes modos de juego"
          - "<gradient:#4ecdc4:#45b7aa>🚀 Supervivencia, Creativo, Minijuegos!</gradient>"
          - ""
          - "<yellow>➤ Clic derecho para elegir</yellow>"
      actions:
        - "[SERVER_SELECTOR]"

    language_selector:
      slot: 7
      material: PLAYER_HEAD
      texture_url: "28b9f52e36aa5c7caaa1e7f26ea97e28f635e8eac9aef74cec97f465f5a6b51"
      display_name:
        en: "<gradient:#a8e6cf:#7fcdcd><bold>🌍 Language / Мова / Idioma</bold></gradient>"
        ua: "<gradient:#a8e6cf:#7fcdcd><bold>🌍 Language / Мова / Idioma</bold></gradient>"
        es: "<gradient:#a8e6cf:#7fcdcd><bold>🌍 Language / Мова / Idioma</bold></gradient>"
      lore:
        en:
          - "<gray>Change your language preference"
          - "<gradient:#ff8a80:#ff5722>🌟 English, Українська, Español</gradient>"
          - ""
          - "<yellow>➤ Right-click to select</yellow>"
        ua:
          - "<gray>Змініть налаштування мови"
          - "<gradient:#ff8a80:#ff5722>🌟 English, Українська, Español</gradient>"
          - ""
          - "<yellow>➤ ПКМ щоб обрати</yellow>"
        es:
          - "<gray>Cambia tu preferencia de idioma"
          - "<gradient:#ff8a80:#ff5722>🌟 English, Українська, Español</gradient>"
          - ""
          - "<yellow>➤ Clic derecho para seleccionar</yellow>"
      actions:
        - "[MENU] language_menu"

    cosmetics:
      slot: 6
      material: DIAMOND
      display_name:
        en: "<gradient:#e91e63:#9c27b0><bold>💎 Cosmetics</bold></gradient>"
        ua: "<gradient:#e91e63:#9c27b0><bold>💎 Косметика</bold></gradient>"
        es: "<gradient:#e91e63:#9c27b0><bold>💎 Cosméticos</bold></gradient>"
      lore:
        en:
          - "<gray>Customize your appearance"
          - "<gradient:#f06292:#ba68c8>✨ Trails, pets, and more!</gradient>"
          - ""
          - "<red>⚠ Coming Soon!</red>"
        ua:
          - "<gray>Налаштуйте свій вигляд"
          - "<gradient:#f06292:#ba68c8>✨ Сліди, вихованці та інше!</gradient>"
          - ""
          - "<red>⚠ Незабаром!</red>"
        es:
          - "<gray>Personaliza tu apariencia"
          - "<gradient:#f06292:#ba68c8>✨ Rastros, mascotas y más!</gradient>"
          - ""
          - "<red>⚠ Próximamente!</red>"
      actions:
        - "[MESSAGE] messages.coming_soon"

